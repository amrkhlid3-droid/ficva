name: Daily E2E Tests

on:
  schedule:
    # Run at 00:00 UTC every day (Beijing Time 08:00)
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps

      - name: Create .env.test
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        run: |
          echo "DATABASE_URL=$TEST_DATABASE_URL" > .env.test
          echo "AUTH_SECRET=${AUTH_SECRET:-dummy_secret_for_ci_build}" >> .env.test

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          # Pass CI=true so playwright.config.ts uses build && start
          CI: true

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
