<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>
  <!-- Stylized F composed of geometric shapes -->
  <rect x="10" y="10" width="25" height="80" rx="6" fill="url(#gradient)" />
  <rect x="40" y="10" width="50" height="25" rx="6" fill="url(#gradient)" />
  <rect x="40" y="45" width="35" height="25" rx="6" fill="url(#gradient)" />
</svg>
